<meta charset="UTF-8">

<title>The Grove — Ecosystem Web</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a1628; color: #e0e8f0; overflow: hidden; }
  #container { width: 100vw; height: 100vh; position: relative; }
  svg { width: 100%; height: 100%; }
  .link { stroke-opacity: 0.18; fill: none; }
  .link.highlighted { stroke-opacity: 0.75; stroke-width: 2.5px !important; }
  .link.dimmed { stroke-opacity: 0.02; }
  .node circle { stroke: #0e1e36; stroke-width: 1.5px; cursor: pointer; }
  .node circle:hover { stroke: #fff; stroke-width: 2px; }
  .node.dimmed circle { opacity: 0.1; }
  .node.highlighted circle { stroke: #fff; stroke-width: 2.5px; }
  .node-label { font-size: 9px; fill: #b8c8d8; pointer-events: none; opacity: 0; transition: opacity 0.15s; }
  .node.highlighted .node-label, .node:hover .node-label { opacity: 1; }
  .show-labels .node-label { opacity: 0.6; font-size: 7.5px; }
  .show-labels .node.highlighted .node-label { opacity: 1; font-size: 10px; }

  #header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 16px 24px;
    background: linear-gradient(180deg, rgba(10,22,40,0.95) 0%, rgba(10,22,40,0) 100%);
    pointer-events: none; z-index: 10;
  }
  #header h1 { font-size: 20px; font-weight: 600; color: #e8f0e8; letter-spacing: 0.5px; }
  #header p { font-size: 12px; color: #8a9ab0; margin-top: 2px; }

  #legend {
    position: absolute; bottom: 20px; left: 20px;
    background: rgba(10,22,40,0.92); border: 1px solid #1a2a44;
    border-radius: 8px; padding: 14px 18px; z-index: 10;
    backdrop-filter: blur(8px); min-width: 210px; max-height: calc(100vh - 60px); overflow-y: auto;
  }
  #legend h3 { font-size: 11px; color: #6a7a90; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; cursor: pointer; padding: 2px 4px; border-radius: 4px; }
  .legend-item:hover { background: rgba(255,255,255,0.05); }
  .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { font-size: 11px; color: #c0ccd8; }
  .legend-count { font-size: 10px; color: #5a6a80; margin-left: auto; }

  #info-panel {
    position: absolute; top: 80px; right: 20px;
    background: rgba(10,22,40,0.93); border: 1px solid #1a2a44;
    border-radius: 8px; padding: 16px; z-index: 10;
    backdrop-filter: blur(8px); width: 280px; display: none; max-height: calc(100vh - 120px); overflow-y: auto;
  }
  #info-panel.visible { display: block; }
  #info-panel h3 { font-size: 14px; font-weight: 600; color: #e8f0e8; font-style: italic; }
  #info-panel .common-name { font-size: 12px; color: #8a9ab0; margin-top: 2px; }
  #info-panel .trophic-badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10px; margin-top: 6px; font-weight: 500;
  }
  #info-panel .connections { margin-top: 12px; }
  #info-panel .connections h4 { font-size: 10px; color: #5a6a80; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; margin-top: 8px; }
  #info-panel .conn-list { font-size: 11px; color: #c0ccd8; line-height: 1.5; }
  #info-panel .conn-item { padding: 1px 0; }

  #controls {
    position: absolute; top: 80px; left: 20px;
    display: flex; flex-direction: column; gap: 6px; z-index: 10;
  }
  .ctrl-btn {
    background: rgba(10,22,40,0.9); border: 1px solid #1a2a44;
    border-radius: 6px; padding: 6px 12px; color: #c0ccd8;
    font-size: 11px; cursor: pointer; backdrop-filter: blur(8px);
  }
  .ctrl-btn:hover { background: rgba(20,40,70,0.9); border-color: #2a4a6a; }
  .ctrl-btn.active { background: rgba(30,60,100,0.9); border-color: #4a7ab0; color: #fff; }

  #search-box { position: absolute; top: 16px; right: 20px; z-index: 10; pointer-events: all; }
  #search-input {
    background: rgba(10,22,40,0.9); border: 1px solid #1a2a44;
    border-radius: 6px; padding: 6px 12px; color: #e0e8f0;
    font-size: 12px; width: 220px; outline: none; backdrop-filter: blur(8px);
  }
  #search-input::placeholder { color: #5a6a80; }
  #search-input:focus { border-color: #4a7ab0; }

  #stats {
    position: absolute; bottom: 20px; right: 20px;
    background: rgba(10,22,40,0.9); border: 1px solid #1a2a44;
    border-radius: 8px; padding: 10px 14px; z-index: 10; backdrop-filter: blur(8px);
  }
  #stats span { font-size: 11px; color: #6a7a90; }
  #stats strong { color: #c0ccd8; }
</style>

// ========== D3 VISUALIZATION ==========
const width = window.innerWidth, height = window.innerHeight;
const svg = d3.select("#graph").attr("viewBox",[0,0,width,height]);
const nodeMap = new Map(S.map(d=>[d.id,d]));
const validLinks = links.filter(l=>nodeMap.has(l.s)&&nodeMap.has(l.t)).map(l=>({source:l.s,target:l.t,type:l.type}));

const linkColor = {feeds_on:"#ff6b6b",pollinates:"#ffd93d",parasitizes:"#4ecdc4",decomposes:"#9b59b6",mycorrhizal:"#2ecc71",tends:"#ff9800"};

svg.append("defs").selectAll("marker")
  .data(Object.keys(linkColor)).join("marker")
  .attr("id",d=>`a-${d}`).attr("viewBox","0 -5 10 10")
  .attr("refX",18).attr("refY",0).attr("markerWidth",5).attr("markerHeight",5).attr("orient","auto")
  .append("path").attr("fill",d=>linkColor[d]).attr("d","M0,-4L10,0L0,4");

const sim = d3.forceSimulation(S)
  .force("link",d3.forceLink(validLinks).id(d=>d.id).distance(70).strength(0.25))
  .force("charge",d3.forceManyBody().strength(-90))
  .force("center",d3.forceCenter(width/2+60,height/2))
  .force("collision",d3.forceCollide().radius(d=>d.size*2+3))
  .force("x",d3.forceX(width/2+60).strength(0.025))
  .force("y",d3.forceY(height/2).strength(0.025));

const g = svg.append("g");
const zoom = d3.zoom().scaleExtent([0.15,5]).on("zoom",e=>g.attr("transform",e.transform));
svg.call(zoom);
const initZoom = d3.zoomIdentity.translate(width/2, height/2).scale(0.75).translate(-width/2, -height/2);
svg.call(zoom.transform, initZoom);

const link = g.append("g").selectAll("line").data(validLinks).join("line")
  .attr("class","link").attr("stroke",d=>linkColor[d.type]||"#556").attr("stroke-width",1)
  .attr("marker-end",d=>`url(#a-${d.type})`);

const node = g.append("g").selectAll("g").data(S).join("g").attr("class","node")
  .call(d3.drag().on("start",(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
  .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;}).on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

node.append("circle").attr("r",d=>d.size*1.8).attr("fill",d=>GROUPS[d.group]?.color||"#888").attr("opacity",d=>d.keystone?0.95:0.75);
node.filter(d=>d.keystone).append("circle").attr("r",d=>d.size*1.8+3).attr("fill","none")
  .attr("stroke",d=>GROUPS[d.group]?.color||"#888").attr("stroke-width",1).attr("stroke-opacity",0.4).attr("stroke-dasharray","3,3");
node.append("text").attr("class","node-label").attr("dy",d=>-d.size*1.8-4).attr("text-anchor","middle")
  .text(d=>d.common||d.sci);

let sel=null;
node.on("click",(e,d)=>{e.stopPropagation();if(sel===d){clr();return;}sel=d;hi(d);info(d);});
svg.on("click",()=>clr());

function hi(d){
  const c=new Set([d.id]);
  const eats=[],eatenBy=[],other=[];
  validLinks.forEach(l=>{
    const s=typeof l.source==="object"?l.source.id:l.source;
    const t=typeof l.target==="object"?l.target.id:l.target;
    if(s===d.id){c.add(t);if(l.type==="feeds_on")eats.push(t);else other.push({id:t,type:l.type});}
    if(t===d.id){c.add(s);if(l.type==="feeds_on")eatenBy.push(s);else other.push({id:s,type:l.type});}
  });
  node.classed("highlighted",n=>c.has(n.id)).classed("dimmed",n=>!c.has(n.id));
  link.classed("highlighted",l=>{const s=typeof l.source==="object"?l.source.id:l.source;const t=typeof l.target==="object"?l.target.id:l.target;return s===d.id||t===d.id;})
      .classed("dimmed",l=>{const s=typeof l.source==="object"?l.source.id:l.source;const t=typeof l.target==="object"?l.target.id:l.target;return s!==d.id&&t!==d.id;});
  return{eats,eatenBy,other};
}
function info(d){
  const cn=hi(d);const p=document.getElementById("info-panel");const gc=GROUPS[d.group]?.color||"#888";
  let h=`<h3>${d.sci}</h3>`;
  if(d.common)h+=`<div class="common-name">${d.common}</div>`;
  h+=`<span class="trophic-badge" style="background:${gc}22;color:${gc};border:1px solid ${gc}44">${d.group}</span>`;
  if(d.keystone)h+=` <span class="trophic-badge" style="background:#ffd93d22;color:#ffd93d;border:1px solid #ffd93d44">Keystone</span>`;
  h+='<div class="connections">';
  if(cn.eats.length){h+='<h4>Feeds on / Uses</h4><div class="conn-list">';cn.eats.forEach(id=>{const sp=nodeMap.get(id);if(sp)h+=`<div class="conn-item">${sp.common||sp.sci}</div>`;});h+='</div>';}
  if(cn.eatenBy.length){h+='<h4>Eaten by / Used by</h4><div class="conn-list">';cn.eatenBy.forEach(id=>{const sp=nodeMap.get(id);if(sp)h+=`<div class="conn-item">${sp.common||sp.sci}</div>`;});h+='</div>';}
  if(cn.other.length){h+='<h4>Other relationships</h4><div class="conn-list">';cn.other.forEach(c=>{const sp=nodeMap.get(c.id);if(sp)h+=`<div class="conn-item"><span style="color:${linkColor[c.type]}">${c.type.replace(/_/g,' ')}</span> — ${sp.common||sp.sci}</div>`;});h+='</div>';}
  h+='</div>';p.innerHTML=h;p.classList.add("visible");
}
function clr(){sel=null;node.classed("highlighted",false).classed("dimmed",false);link.classed("highlighted",false).classed("dimmed",false);document.getElementById("info-panel").classList.remove("visible");}

// Legend
const gc={};S.forEach(s=>{gc[s.group]=(gc[s.group]||0)+1;});
let lh='<h3>Trophic Groups</h3>';
Object.entries(GROUPS).sort((a,b)=>a[1].order-b[1].order).filter(([n])=>gc[n]).forEach(([n,i])=>{
  lh+=`<div class="legend-item" data-group="${n}"><span class="legend-dot" style="background:${i.color}"></span><span class="legend-label">${n}</span><span class="legend-count">${gc[n]}</span></div>`;
});
lh+='<h3 style="margin-top:10px">Relationships</h3>';
[["feeds_on","Feeds on","#ff6b6b"],["pollinates","Pollinates","#ffd93d"],["mycorrhizal","Mycorrhizal","#2ecc71"],["decomposes","Decomposes","#9b59b6"],["parasitizes","Parasitizes","#4ecdc4"],["tends","Tends/farms","#ff9800"]]
.forEach(([,l,c])=>{lh+=`<div class="legend-item"><span class="legend-dot" style="background:${c};width:14px;height:3px;border-radius:1px"></span><span class="legend-label">${l}</span></div>`;});
document.getElementById("legend").innerHTML=lh;
document.querySelectorAll(".legend-item[data-group]").forEach(el=>{
  el.addEventListener("click",()=>{const gr=el.dataset.group;const ids=new Set(S.filter(s=>s.group===gr).map(s=>s.id));
  node.classed("highlighted",n=>ids.has(n.id)).classed("dimmed",n=>!ids.has(n.id));link.classed("dimmed",true).classed("highlighted",false);});
});

// Stats
document.getElementById("stats").innerHTML=`<span>Species: <strong>${S.length}</strong></span> · <span>Relationships: <strong>${validLinks.length}</strong></span> · <span>Groups: <strong>${Object.keys(gc).length}</strong></span>`;

// Controls
let showL=false;
document.getElementById("btn-labels").addEventListener("click",function(){showL=!showL;this.classList.toggle("active",showL);svg.classed("show-labels",showL);});
let tL=false;
document.getElementById("btn-trophic").addEventListener("click",function(){tL=!tL;this.classList.toggle("active",tL);
  sim.force("y",tL?d3.forceY(d=>{const o=GROUPS[d.group]?.order??3;return 60+(o/5.5)*(height-120);}).strength(0.5):d3.forceY(height/2).strength(0.025));
  sim.alpha(0.8).restart();
});
document.getElementById("btn-reset").addEventListener("click",()=>{clr();svg.transition().duration(500).call(zoom.transform,d3.zoomIdentity);tL=false;document.getElementById("btn-trophic").classList.remove("active");sim.force("y",d3.forceY(height/2).strength(0.025));sim.force("x",d3.forceX(width/2+60).strength(0.025));sim.alpha(0.5).restart();});

// Search
document.getElementById("search-input").addEventListener("input",function(){
  const q=this.value.toLowerCase().trim();if(!q){clr();return;}
  const m=new Set();S.forEach(s=>{if(s.sci.toLowerCase().includes(q)||(s.common&&s.common.toLowerCase().includes(q)))m.add(s.id);});
  node.classed("highlighted",n=>m.has(n.id)).classed("dimmed",n=>!m.has(n.id));link.classed("dimmed",true);
});

// Tick
sim.on("tick",()=>{
  link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  node.attr("transform",d=>`translate(${d.x},${d.y})`);
});
</script>
</body>
